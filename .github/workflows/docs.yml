# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Deploy docs to github pages
on:
  push:
    branches: [main, feature-docs]

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml
      - name: Install dependencies
        run: |
          cd docs
          pnpm install --frozen-lockfile
      - name: Generate schema for docs
        run: |
          # Generate the rabbit-digger-pro schema for docs reference.
          mkdir -p docs/static/schema
          cargo run --release --manifest-path Cargo.toml -- generate-schema docs/static/schema/rabbit-digger-pro-schema.json
      - name: Build website
        run: |
          cd docs
          pnpm build
      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build
  deploy:
    name: Deploy to GitHub Pages
    needs: build

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
