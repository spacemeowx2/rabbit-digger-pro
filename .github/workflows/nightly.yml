# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Nightly Build

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  check_changes:
    name: Check for new commits
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_changes: ${{ steps.compare.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Compare HEAD with nightly tag
        id: compare
        run: |
          HEAD_SHA=$(git rev-parse HEAD)
          # Fetch the nightly tag if it exists (ignore errors when it doesn't)
          git fetch origin refs/tags/nightly:refs/tags/nightly 2>/dev/null || true
          # Dereference to commit SHA (works for both lightweight and annotated tags)
          NIGHTLY_SHA=$(git rev-parse --verify refs/tags/nightly^{commit} 2>/dev/null || echo "")
          if [ "$HEAD_SHA" = "$NIGHTLY_SHA" ]; then
            echo "No new commits since last nightly build."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "New commits detected."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build
    needs: check_changes
    if: needs.check_changes.outputs.has_changes == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: rabbit-digger-pro
            release_name: rabbit-digger-pro-linux-amd64
          - os: windows-latest
            artifact_name: rabbit-digger-pro.exe
            release_name: rabbit-digger-pro-windows-amd64.exe
          - os: macos-latest
            artifact_name: rabbit-digger-pro
            release_name: rabbit-digger-pro-macos-amd64
    steps:
      - run: git config --global core.autocrlf false
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: ${{ matrix.os }}-stable-cargo-v1
          restore-keys: |
            ${{ matrix.os }}-stable-cargo-v1
      - name: Setup toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test --all --exclude raw
      - name: Build release
        run: cargo build --release
      - name: Upload binaries to nightly release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/release/${{ matrix.artifact_name }}
          asset_name: ${{ matrix.release_name }}
          tag: nightly
          release_name: Nightly Build
          prerelease: true
          overwrite: true
          body: "This is the latest nightly build from the main branch."

  cross_compile:
    name: Cross compile
    needs: check_changes
    if: needs.check_changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        target:
          - armv7-unknown-linux-gnueabihf
          - aarch64-unknown-linux-musl
          - i686-unknown-linux-musl
          - x86_64-unknown-linux-musl
    steps:
      - run: git config --global core.autocrlf false
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: ${{ matrix.target }}-stable-cargo-v1
          restore-keys: |
            ${{ matrix.target }}-stable-cargo-v1
      - name: Setup toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build release
        run: cross build --release --target=${{ matrix.target }}
      - name: Upload binaries to nightly release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/${{ matrix.target }}/release/rabbit-digger-pro
          asset_name: rabbit-digger-pro-${{ matrix.target }}
          tag: nightly
          release_name: Nightly Build
          prerelease: true
          overwrite: true
          body: "This is the latest nightly build from the main branch."
